name: docs

# Build the MkDocs site and publish it to the fastsqs/fastsqs.github.io repo,
# which serves at https://fastsqs.github.io. Runs on pushes to main that touch
# the docs or their inputs.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    name: build and deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate edit/last-update links
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build site (strict)
        run: mkdocs build --strict
      - name: Publish to fastsqs.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: fastsqs/fastsqs.github.io
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: "docs: deploy from fastsqs/fastsqs@${{ github.sha }}"
