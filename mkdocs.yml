site_name: FastSQS
site_url: https://fastsqs.github.io
site_description: >-
  A FastAPI-style router for AWS SQS on Lambda: pydantic routing, dependency
  injection, middleware, and native partial batch failure.
site_author: Gabriel LaFayette
copyright: Copyright &copy; Gabriel LaFayette. MIT License.

repo_url: https://github.com/fastsqs/fastsqs
repo_name: fastsqs/fastsqs
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [.]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            filters: ["!^_"]

nav:
  - Home: index.md
  - Get Started:
      - Why fastsqs: get-started/why.md
      - Installation: get-started/installation.md
      - Quickstart: get-started/quickstart.md
  - Guide:
      - Route by payload type: guide/routing-by-type.md
      - Route by a key value: guide/routing-by-key.md
      - Routers, subrouters, and defaults: guide/routers-and-defaults.md
      - Inject dependencies: guide/dependency-injection.md
      - Enable partial batch failure: guide/partial-batch-failure.md
      - Choose a FIFO failure mode: guide/fifo-failure-modes.md
      - Write middleware: guide/middleware.md
      - Use built-in middleware: guide/builtin-middleware.md
      - Consume EventBridge Pipes events: guide/eventbridge-pipes.md
      - Multiplex SQS and API Gateway: guide/multiplexing.md
      - Test handlers in-process: guide/testing.md
  - Concepts:
      - How routing works: concepts/routing.md
      - The batch lifecycle: concepts/lifecycle.md
      - Context vs State: concepts/context-and-state.md
      - Partial batch failure and redelivery: concepts/partial-batch-failure.md
      - FIFO ordering and failure modes: concepts/fifo-ordering.md
      - Queue-type detection: concepts/queue-type-detection.md
  - Examples: examples.md
  - Troubleshooting: troubleshooting.md
  - API Reference:
      - Overview: reference/index.md
      - FastSQS: reference/app.md
      - SQSRouter: reference/router.md
      - SQSEvent: reference/events.md
      - Context, State, FifoInfo: reference/context.md
      - QueueType: reference/queue-type.md
      - Depends: reference/dependencies.md
      - Middleware: reference/middleware.md
      - is_sqs_event: reference/utils.md
      - Exceptions: reference/exceptions.md
      - Testing utilities: reference/testing.md
  - About:
      - Changelog: about/changelog.md
      - Versioning policy: about/versioning.md
      - Contributing: about/contributing.md
      - License: about/license.md
